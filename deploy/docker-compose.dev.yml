# 로컬/개발용: 이미지 빌드 후 /srv/strati2026 의 DB 를 마운트해 구동.
#   docker compose -f deploy/docker-compose.dev.yml up --build
services:
  strati2026:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: honestjung/strati2026:latest
    environment:
      - STRATI_DB_PATH=/app/db.sqlite3
      - STRATI_DEBUG=False
    ports:
      - "8010:8000"
    volumes:
      - /srv/strati2026/db.sqlite3:/app/db.sqlite3
    restart: unless-stopped
