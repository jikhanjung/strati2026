services:
  strati2026:
    image: honestjung/strati2026:${IMAGE_TAG}
    container_name: strati2026
    environment:
      - STRATI_DB_PATH=/app/db.sqlite3
      - STRATI_MEDIA_ROOT=/app/media
    ports:
      - "127.0.0.1:${HOST_PORT:-8010}:8000"
    volumes:
      - /srv/strati2026/db.sqlite3:/app/db.sqlite3
      - /srv/strati2026/media:/app/media
    env_file:
      - /srv/strati2026/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
