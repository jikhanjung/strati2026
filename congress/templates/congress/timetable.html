{% extends "base.html" %}
{% block title %}My Plan · STRATI 2026{% endblock %}
{% block content %}
<h1 class="page-h">My Plan</h1>
<p class="hint">Bookmarked talks are saved on this device.</p>
<a id="cal-all" class="cal-btn" href="#" hidden>📅 Add all to Calendar</a>
<div id="tt"><p class="empty">Loading…</p></div>
<button id="nowbtn" class="nowbtn" hidden>● Now</button>
{% endblock %}
{% block scripts %}
<script>
(async function () {
  const ids = STRATI.getBM();
  const box = document.getElementById('tt');
  if (!ids.length) { box.innerHTML = '<p class="empty">No bookmarks yet. Tap ☆ on talks to add them.</p>'; return; }
  // 북마크한 발표만 요청 → 페이로드 최소화 (전체 프로그램을 받지 않음)
  const res = await fetch('{% url "api_talks" %}?v={{ version }}&ids=' + ids.join(','));
  const payload = await res.json();
  const all = payload.talks;
  const allBreaks = payload.breaks || [];
  const set = new Set(ids);
  const mine = all.filter(t => set.has(t.id));
  if (!mine.length) { box.innerHTML = '<p class="empty">No bookmarks found.</p>'; return; }

  const PX = 3.4, MIN_H = 50;      // 겹침 그리드: 분당 픽셀, 박스 최소 높이
  function parseMin(s) {
    const m = /^(\d{1,2}):(\d{2})$/.exec(s || ""); return m ? +m[1]*60 + +m[2] : null;
  }
  function endMin(t) {             // 종료시간 없으면 시작+20분으로 가정(박스 높이용)
    const s = parseMin(t.start), e = parseMin(t.end);
    return e != null && e > s ? e : (s != null ? s + 20 : null);
  }

  const days = [...new Set(mine.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start)).map(t=>t.day))];

  // grid=true면 클러스터 내 절대배치(top/height 인라인)
  function talkCard(t, grid) {
    const place = [t.room, t.floor].filter(Boolean).join(' · ');
    const cls = grid ? 'talk gtalk' : 'talk';
    const style = grid ? ` style="top:${grid.top}px;height:${grid.height}px"` : '';
    return `<div class="${cls}" data-id="${t.id}" data-start="${t.start}" data-end="${t.end||''}"${style}>
      <div class="talk-time">${t.start}${t.end?'–'+t.end:''}</div>
      <div class="talk-body">
        <a class="talk-title" href="/talk/${t.id}/">${STRATI.esc(t.title)}</a>
        <div class="talk-meta">${t.session?`<span class="badge">${t.session}</span>`:''}
          ${t.author?`<span class="author">${STRATI.esc(t.author)}</span>`:''}</div>
        ${place?`<div class="talk-place">📍 ${STRATI.esc(place)}</div>`:''}
      </div>
      <button class="bm" data-id="${t.id}">★</button>
    </div>`;
  }
  function breakRow(b) {
    return `<div class="brk" data-start="${b.start}" data-end="${b.end}">
      <div class="talk-time">${b.start}–${b.end}</div>
      <div class="brk-label">${b.label==='Lunch'?'🍽️':'☕'} ${b.label}</div>
    </div>`;
  }

  // 시간이 겹치는 talk들을 한 묶음(클러스터)으로 — running max-end 기준
  function clusterize(items) {
    const sorted = [...items].sort((a,b)=> a.start.localeCompare(b.start) || (endMin(a)-endMin(b)));
    const out = []; let cur = null, curEnd = -1;
    for (const t of sorted) {
      const s = parseMin(t.start);
      if (cur && s < curEnd) { cur.push(t); curEnd = Math.max(curEnd, endMin(t)); }
      else { cur = [t]; out.push(cur); curEnd = endMin(t); }
    }
    return out;
  }
  // 클러스터 내 컬럼 배정(겹치지 않으면 같은 컬럼 재사용)
  function assignColumns(cluster) {
    const cols = []; const colOf = new Map();
    for (const t of [...cluster].sort((a,b)=> a.start.localeCompare(b.start))) {
      const s = parseMin(t.start);
      let ci = cols.findIndex(c => c.lastEnd <= s);
      if (ci < 0) { ci = cols.length; cols.push({ lastEnd: -1 }); }
      cols[ci].lastEnd = endMin(t); colOf.set(t.id, ci);
    }
    return { ncols: cols.length, colOf };
  }
  // 2개 이상 동시: 비례 그리드 + 카드 폭 86%(옆 카드 살짝 보임) + 좌우 스크롤
  function renderCluster(cluster) {
    const cs = Math.min(...cluster.map(t=>parseMin(t.start)));
    const ce = Math.max(...cluster.map(endMin));
    const { ncols, colOf } = assignColumns(cluster);
    const H = Math.round((ce - cs) * PX) + MIN_H;
    const flex = ncols >= 2 ? 'flex:0 0 86%' : 'flex:0 0 100%';
    let cols = '';
    for (let c = 0; c < ncols; c++) {
      let inner = '';
      cluster.filter(t => colOf.get(t.id) === c).forEach(t => {
        const top = Math.round((parseMin(t.start) - cs) * PX);
        const height = Math.max(Math.round((endMin(t) - parseMin(t.start)) * PX), MIN_H);
        inner += talkCard(t, { top, height });
      });
      cols += `<div class="gcol" style="${flex};height:${H}px">${inner}</div>`;
    }
    return `<div class="cluster" style="height:${H}px">${cols}</div>`;
  }

  let html = '';
  days.forEach(day => {
    const items = mine.filter(t => t.day === day)
                      .sort((a,b)=>a.start.localeCompare(b.start));
    // 북마크한 talk 직전(같은 룸)의 휴식만 후보로 — 그 발표로 이어지는 break
    const cand = [];
    items.forEach(t => {
      const b = allBreaks.find(b => b.day === day && b.room === t.room && b.end === t.start);
      if (b) cand.push(b);
    });
    // 룸마다 5분쯤 어긋나 겹치는 휴식은 하나만 표시
    cand.sort((a,b) => a.start.localeCompare(b.start) || a.end.localeCompare(b.end));
    const breaks = [];
    cand.forEach(b => {
      if (!breaks.some(x => x.start < b.end && b.start < x.end)) breaks.push(b);
    });

    // 블록 = 클러스터(겹침 묶음) + 휴식, 시작시각 순
    const blocks = [
      ...clusterize(items).map(c => ({ s: c[0].start, k: 'c', v: c })),
      ...breaks.map(b => ({ s: b.start, k: 'b', v: b })),
    ].sort((a,b)=> a.s.localeCompare(b.s));

    html += `<section class="room" data-date="${items[0].date}"><h2 class="room-h">${day}</h2>`;
    blocks.forEach(blk => {
      if (blk.k === 'b') html += breakRow(blk.v);
      else if (blk.v.length === 1) html += talkCard(blk.v[0]);   // 단독 → 전체폭
      else html += renderCluster(blk.v);                          // 겹침 → 컬럼
    });
    html += `</section>`;
  });
  box.innerHTML = html;
  STRATI.refresh();

  const calAll = document.getElementById('cal-all');
  calAll.href = '{% url "calendar_ics" %}?ids=' + mine.map(t => t.id).join(',');
  calAll.hidden = false;

  // ── 현재 시각 빨간 줄 + 점프 버튼 (오늘 섹션에만) ──────────────────
  const nowbtn = document.getElementById('nowbtn');
  function shanghaiNow() {
    const f = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', hour12: false,
      year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
      .formatToParts(new Date());
    const g = t => f.find(p => p.type === t).value;
    return { date: `${g('year')}-${g('month')}-${g('day')}`, min: +g('hour')*60 + +g('minute') };
  }
  // now(분) → 섹션 내 y픽셀. 카드 실측(rect)으로 — 그리드 절대배치에서도 정확.
  function nowY(sec, now) {
    const y0 = sec.getBoundingClientRect().top;
    const cards = [...sec.querySelectorAll('[data-start]')].map(el => {
      const r = el.getBoundingClientRect();
      let s = parseMin(el.dataset.start), e = parseMin(el.dataset.end);
      if (e == null || e < s) e = s;
      return { s, e, top: r.top - y0, bot: r.bottom - y0 };
    }).filter(c => c.s != null);
    if (!cards.length) return null;
    // 진행 중인 카드 안: 시간 비례 보간 (동시 발표면 가장 위 카드 기준)
    const active = cards.filter(c => now >= c.s && now < c.e).sort((a,b)=> a.top-b.top)[0];
    if (active) {
      const f = active.e > active.s ? (now - active.s)/(active.e - active.s) : 0;
      return active.top + f*(active.bot - active.top);
    }
    const minS = Math.min(...cards.map(c=>c.s)), maxE = Math.max(...cards.map(c=>c.e));
    if (now <= minS) return Math.min(...cards.map(c=>c.top));
    if (now >= maxE) return Math.max(...cards.map(c=>c.bot));
    // 빈틈: 직전 종료 카드와 다음 시작 카드 사이 보간
    const before = cards.filter(c=> c.e <= now).sort((a,b)=> b.e-a.e)[0];
    const after  = cards.filter(c=> c.s >= now).sort((a,b)=> a.s-b.s)[0];
    if (before && after) {
      const f = (now - before.e)/((after.s - before.e) || 1);
      return before.bot + f*(after.top - before.bot);
    }
    return before ? before.bot : (after ? after.top : 0);
  }

  let lineY = null, firstPlace = true;
  function jumpToNow() {
    if (lineY == null) return;
    window.scrollTo({ top: Math.max(0, lineY - window.innerHeight*0.4), behavior: 'smooth' });
  }
  function updateBtn() {
    if (!nowbtn) return;
    if (lineY == null) { nowbtn.hidden = true; return; }
    const top = lineY - window.scrollY;
    nowbtn.hidden = top > 60 && top < window.innerHeight - 60;
  }
  function placeNow() {
    document.querySelectorAll('.nowline').forEach(n => n.remove());
    lineY = null;
    if (nowbtn) nowbtn.hidden = true;
    const sn = shanghaiNow();
    const sec = [...document.querySelectorAll('#tt .room')]
      .find(s => s.dataset.date === sn.date);   // 오늘이 북마크에 있을 때만
    if (!sec) return;
    sec.style.position = 'relative';
    const y = nowY(sec, sn.min);
    if (y == null) return;
    const line = document.createElement('div');
    line.className = 'nowline'; line.style.top = y + 'px';
    line.innerHTML = '<span class="nowdot"></span>';
    sec.appendChild(line);
    lineY = line.getBoundingClientRect().top + window.scrollY;
    updateBtn();
    if (firstPlace) { firstPlace = false; jumpToNow(); }
  }
  if (nowbtn) nowbtn.addEventListener('click', jumpToNow);
  window.addEventListener('scroll', updateBtn, { passive: true });
  window.addEventListener('resize', placeNow);
  setInterval(placeNow, 60000);
  placeNow();
})();
</script>
{% endblock %}
