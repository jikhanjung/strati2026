{# 휴식/점심 (표시 전용, 변수: b = {start,end,label}) #}
<div class="brk" data-start="{{ b.start|time:'H:i' }}" data-end="{{ b.end|time:'H:i' }}">
  <div class="talk-time">{{ b.start|time:"H:i" }}–{{ b.end|time:"H:i" }}</div>
  <div class="brk-label">{% if b.label == "Lunch" %}🍽️{% else %}☕{% endif %} {{ b.label }}</div>
</div>
